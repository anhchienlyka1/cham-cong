name: cham_cong_app
description: "Ứng dụng chấm công - Flutter Clean Architecture"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.8
  firebase_auth: ^5.5.2

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Routing
  go_router: ^15.1.2

  # Network
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Functional Programming
  dartz: ^0.10.1

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Logging
  logger: ^2.5.0

  # Location & Notifications (background GPS check)
  geolocator: ^13.0.2
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0
  timezone: ^0.9.4
  flutter_timezone: ^5.0.0

  # UI Utilities
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  gap: ^3.0.1
  intl: ^0.20.2
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/mock/
